# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

# Tag convention: `vX.Y.Z` (workflow triggers on `v*`).
# `project_name` controls archive prefix (e.g. compass_Darwin_x86_64.tar.gz)
# and decouples it from the repo name (CompassLabs/cli).
project_name: compass

before:
  hooks:
    - go mod tidy

builds:
  - id: compass
    main: ./cmd/compass
    binary: compass
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}

archives:
  - id: compass
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

release:
  github:
    owner: CompassLabs
    name: cli
  draft: false
  prerelease: auto
  mode: append

checksum:
  name_template: "checksums.txt"
